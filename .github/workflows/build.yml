name: Build and Release
on:
    push:
        branches: [ "master" ]
        paths:
            - 'GW Launcher/**'
            - '.github/workflows/build.yml'
    pull_request:
        branches: [ "master" ]
        paths:
            - 'GW Launcher/**'
            - '.github/workflows/build.yml'
defaults:
    run:
        shell: pwsh
jobs:
    build:
        runs-on: windows-2025-vs2026
        permissions:
            contents: write
        # Exposed at job level so the signing steps can gate on `env.CERTUM_OTP_URI`
        # (secrets can't be referenced directly in an `if:` expression).
        env:
            CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
            CERTUM_USERID: ${{ secrets.CERTUM_USERID }}
            CERTUM_CERT_SHA1: ${{ secrets.CERTUM_CERT_SHA1 }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Install .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: 10.0.x

            -   name: Setup MSBuild
                uses: microsoft/setup-msbuild@v2

            -   name: .NET Tool Restore
                run: dotnet tool restore

            -   name: GitVersion
                run: |
                    $gitVersionOutput = dotnet dotnet-gitversion /output json
                    $gitVersionObj = $gitVersionOutput | ConvertFrom-Json
                    $version = "$($gitVersionObj.Major).$($gitVersionObj.Minor)"
                    echo "VERSION=$version" >> $env:GITHUB_ENV

            -   name: Build GW Launcher Self Contained
                run: |
                    MSBuild.exe "GW Launcher\GW Launcher.csproj" `
                      /target:"Restore;Publish" `
                      /m /nodeReuse:false `
                      /property:"PublishProfile=SelfContained" `
                      /property:GitVersion_NoFetchEnabled=true

            -   name: Rename SelfContained Executable
                run: |
                    Move-Item -Path "Publish\GW Launcher.exe" -Destination "Publish\GW_Launcher.exe" -Force

            -   name: Build GW Launcher Framework Dependent
                run: |
                    MSBuild.exe "GW Launcher\GW Launcher.csproj" `
                      /target:"Restore;Publish" `
                      /m /nodeReuse:false `
                      /property:"PublishProfile=FrameworkDependent" `
                      /property:GitVersion_NoFetchEnabled=true

            -   name: Rename FrameworkDependent Executable
                run: |
                    Move-Item -Path "Publish\GW Launcher.exe" -Destination "Publish\GW_Launcher_Framework_Dependent.exe" -Force

            # Certum SimplySign code signing. The executables are signed in place
            # in Publish\ before the artifact upload and release. Each step is
            # gated on the CERTUM_OTP_URI secret, so forks and un-provisioned
            # environments still build (and release) unsigned instead of failing.
            -   name: Set up Certum SimplySign
                if: github.event_name == 'push' && github.ref == 'refs/heads/master' && env.CERTUM_OTP_URI != ''
                shell: bash
                run: |
                    chmod +x ./.github/scripts/install-simplysign.sh
                    ./.github/scripts/install-simplysign.sh
                    powershell -ExecutionPolicy Bypass -File "./.github/scripts/configure-simplysign.ps1"

            -   name: Authenticate Certum SimplySign
                if: github.event_name == 'push' && github.ref == 'refs/heads/master' && env.CERTUM_OTP_URI != ''
                shell: bash
                run: powershell -ExecutionPolicy Bypass -File "./.github/scripts/connect-simplysign.ps1"

            -   name: Sign release binaries
                if: github.event_name == 'push' && github.ref == 'refs/heads/master' && env.CERTUM_OTP_URI != ''
                run: |
                    ./.github/scripts/sign-certum.ps1 -Files @("Publish/GW_Launcher.exe", "Publish/GW_Launcher_Framework_Dependent.exe")

            -   name: Upload Artifact
                uses: actions/upload-artifact@v4
                with:
                    name: GW Launcher
                    path: |
                        Publish\GW_Launcher.exe
                        Publish\GW_Launcher_Framework_Dependent.exe
                    if-no-files-found: error

            -   name: Generate Release Notes
                if: github.event_name == 'push' && github.ref == 'refs/heads/master'
                id: generate_release_notes
                uses: mikepenz/release-changelog-builder-action@v5
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                with:
                    configuration: '.github/changelog-config.json'
                    toTag: ${{ github.ref }}
                    fromTag: ${{ github.event.before }}
                    fetchReleaseInformation: true
                    fetchReviewers: true
                    fetchReviews: true
                    failOnError: false
                    ignorePreReleases: false
                    
            -   name: Create Release
                if: github.event_name == 'push' && github.ref == 'refs/heads/master'
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    gh release create "r${{ env.VERSION }}" `
                      --title "Release ${{ env.VERSION }}" `
                      --notes "${{ steps.generate_release_notes.outputs.changelog }}" `
                      ./Publish/GW_Launcher.exe `
                      ./Publish/GW_Launcher_Framework_Dependent.exe
